name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  swift-checks:
    name: Swift Checks
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run Dead Air checks
        run: swift run DeadAirChecks

      - name: Build release with warnings as errors
        run: swift build -c release -Xswiftc -warnings-as-errors
